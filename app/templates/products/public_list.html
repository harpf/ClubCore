{% extends 'base.html' %}
{% block content %}
<div class="hero mb-3"><h1>DiscGolf Produkt-Wiki</h1><p class="mb-0">Mobil, Tablet & Desktop optimiert.</p></div>
<form method="get" class="row g-2 mb-3">
  <div class="col-12 col-md-6"><input name="q" value="{{ q }}" class="form-control" placeholder="Suchen..."></div>
  <div class="col-8 col-md-3"><select name="category" class="form-select"><option value="">Alle Kategorien</option>{% for c in categories %}<option value="{{ c }}" {% if c==category %}selected{% endif %}>{{ c }}</option>{% endfor %}</select></div>
  <div class="col-4 col-md-3"><button class="btn btn-success w-100">Filtern</button></div>
</form>
<div class="row g-3">
{% for p in products %}<div class="col-12 col-sm-6 col-lg-4"><div class="card product-card h-100"><div class="card-body"><h5><a href="{{ url_for('products.product_detail', product_id=p.id) }}">{{ p.name }}</a></h5><p class="text-muted mb-0">{{ p.manufacturer }} · {{ p.category }}</p></div></div></div>{% else %}<p>Keine Produkte gefunden.</p>{% endfor %}
</div>
{% endblock %}
